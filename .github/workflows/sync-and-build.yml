name: Sync and Build Rule-Sets

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Download ULG
        env:
          ULG_RELEASE_TOKEN: ${{ secrets.ULG_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/download_ulg.py

      - name: Run ULG build
        run: |
          ./ulg --quiet

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/
          if git diff --cached --quiet; then
            echo "Нет изменений для коммита."
          else
            git commit -m "Automated build (ULG): $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
            git push
          fi
