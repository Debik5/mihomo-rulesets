syntax = "proto3";
package geodat;

// geosite.dat
message Domain {
  enum Type {
    Plain  = 0;  // keyword
    Regex  = 1;  // regex
    Domain = 2;  // RootDomain (домен + все поддомены)
    Full   = 3;  // точное совпадение
  }
  Type   type  = 1;
  string value = 2;
}
message GeoSite {
  string country_code    = 1;
  repeated Domain domain = 2;
}
message GeoSiteList {
  repeated GeoSite entry = 1;
}

// geoip.dat
message CIDR {
  bytes  ip     = 1;  // raw bytes: 4 для IPv4, 16 для IPv6
  uint32 prefix = 2;
}
message GeoIP {
  string country_code  = 1;
  repeated CIDR cidr   = 2;
}
message GeoIPList {
  repeated GeoIP entry = 1;
}
